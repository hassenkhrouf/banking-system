server:
  port: 8080

spring:
  application:
    name: banking-system

  # ===== Database Configuration =====
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: validate # نستخدم validate لأن الجداول أنشأناها يدوياً
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ===== Jackson (JSON serialization) =====
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ===== JWT Configuration =====
app:
  jwt:
    secret: "ZmFudGFzdGljLXNlY3JldC1rZXktZm9yLWJhbmtpbmctc3lzdGVtLW11c3QtYmUtbG9uZy1hbmQtc2VjdXJlLWZvci1oczI1Ng=="
    expiration-ms: 900000 # 15 دقيقة (access token)
    refresh-expiration-ms: 604800000 # 7 أيام (refresh token)

# ===== Logging =====
logging:
  level:
    com.banking: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
