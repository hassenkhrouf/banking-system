server:
  port: 8080

spring:
  application:
    name: banking-system

  # ===== Database Configuration =====
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ===== SQL Initialization =====
  sql:
    init:
      mode: always
      continue-on-error: true

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ===== Jackson (JSON serialization) =====
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ===== JWT Configuration =====
app:
  jwt:
    secret: ${JWT_SECRET:ZmFudGFzdGljLXNlY3JldC1rZXktZm9yLWJhbmtpbmctc3lzdGVtLW11c3QtYmUtbG9uZy1hbmQtc2VjdXJlLWZvci1oczI1Ng==}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== Logging =====
logging:
  level:
    com.banking: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
